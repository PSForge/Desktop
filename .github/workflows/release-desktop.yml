name: Release PSForge Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-release:
    runs-on: windows-latest
    environment: production
    permissions:
      contents: write
      id-token: write

    env:
      DESKTOP_OUTPUT_DIR: release-publish
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_RESOURCE_GROUP: ${{ secrets.AZURE_TRUSTED_SIGNING_RESOURCE_GROUP }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate desktop assets
        run: npm run desktop:icons

      - name: Build desktop app
        run: npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Artifact Signing configuration
        shell: pwsh
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
        run: |
          $ErrorActionPreference = "Stop"

          $requiredSecrets = @(
            "AZURE_TRUSTED_SIGNING_RESOURCE_GROUP",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT",
            "AZURE_TRUSTED_SIGNING_CERT_PROFILE"
          )

          foreach ($secretName in $requiredSecrets) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($secretName))) {
              throw "Missing $secretName secret."
            }
          }

          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name artifact-signing --yes

          $account = az artifact-signing show `
            --resource-group $env:AZURE_TRUSTED_SIGNING_RESOURCE_GROUP `
            --name $env:AZURE_TRUSTED_SIGNING_ACCOUNT `
            --output json | ConvertFrom-Json

          $profile = az artifact-signing certificate-profile show `
            --resource-group $env:AZURE_TRUSTED_SIGNING_RESOURCE_GROUP `
            --account-name $env:AZURE_TRUSTED_SIGNING_ACCOUNT `
            --name $env:AZURE_TRUSTED_SIGNING_CERT_PROFILE `
            --output json | ConvertFrom-Json

          $endpointByLocation = @{
            "brazilsouth" = "https://brs.codesigning.azure.net"
            "centralus" = "https://cus.codesigning.azure.net"
            "eastus" = "https://eus.codesigning.azure.net"
            "japaneast" = "https://jpe.codesigning.azure.net"
            "koreacentral" = "https://krc.codesigning.azure.net"
            "northcentralus" = "https://ncus.codesigning.azure.net"
            "northeurope" = "https://neu.codesigning.azure.net"
            "polandcentral" = "https://plc.codesigning.azure.net"
            "southcentralus" = "https://scus.codesigning.azure.net"
            "switzerlandnorth" = "https://swn.codesigning.azure.net"
            "westcentralus" = "https://wcus.codesigning.azure.net"
            "westeurope" = "https://weu.codesigning.azure.net"
            "westus" = "https://wus.codesigning.azure.net"
            "westus2" = "https://wus2.codesigning.azure.net"
            "westus3" = "https://wus3.codesigning.azure.net"
          }

          $locationKey = ($account.location -replace "\s", "").ToLowerInvariant()
          $expectedEndpoint = $endpointByLocation[$locationKey]

          Write-Host "Artifact Signing account location: $($account.location)"
          Write-Host "Artifact Signing account provisioning state: $($account.properties.provisioningState)"
          Write-Host "Certificate profile provisioning state: $($profile.properties.provisioningState)"
          Write-Host "Certificate profile type: $($profile.properties.profileType)"

          if (!$expectedEndpoint) {
            throw "No expected Artifact Signing endpoint mapping is configured for account location '$($account.location)'."
          }

          if ($env:AZURE_TRUSTED_SIGNING_ENDPOINT.TrimEnd("/") -ne $expectedEndpoint) {
            throw "AZURE_TRUSTED_SIGNING_ENDPOINT does not match the Artifact Signing account location '$($account.location)'. Expected: $expectedEndpoint"
          }

      - name: Build signed Windows release
        shell: pwsh
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
        run: |
          $requiredSecrets = @(
            "AZURE_CLIENT_SECRET",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT",
            "AZURE_TRUSTED_SIGNING_CERT_PROFILE",
            "AZURE_TRUSTED_SIGNING_PUBLISHER_NAME"
          )

          foreach ($secretName in $requiredSecrets) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($secretName))) {
              throw "Missing $secretName secret."
            }
          }

          npx electron-builder --win nsis zip --publish never `
            --config.directories.output=$env:DESKTOP_OUTPUT_DIR `
            --config.win.azureSignOptions.endpoint=$env:AZURE_TRUSTED_SIGNING_ENDPOINT `
            --config.win.azureSignOptions.codeSigningAccountName=$env:AZURE_TRUSTED_SIGNING_ACCOUNT `
            --config.win.azureSignOptions.certificateProfileName=$env:AZURE_TRUSTED_SIGNING_CERT_PROFILE `
            --config.win.azureSignOptions.publisherName=$env:AZURE_TRUSTED_SIGNING_PUBLISHER_NAME `
            --config.win.azureSignOptions.ExcludeCredentials=ManagedIdentityCredential,WorkloadIdentityCredential,SharedTokenCacheCredential,VisualStudioCredential,VisualStudioCodeCredential,AzureCliCredential,AzurePowerShellCredential,AzureDeveloperCliCredential,InteractiveBrowserCredential `
            --config.win.azureSignOptions.fileDigest=SHA256 `
            --config.win.azureSignOptions.timestampRfc3161=http://timestamp.acs.microsoft.com `
            --config.win.azureSignOptions.timestampDigest=SHA256

      - name: Verify update metadata
        shell: pwsh
        run: |
          $requiredPatterns = @(
            "latest.yml",
            "PSForge-Desktop-Setup-*-x64.exe",
            "PSForge-Desktop-Setup-*-x64.exe.blockmap"
          )

          foreach ($pattern in $requiredPatterns) {
            $match = Get-ChildItem -Path $env:DESKTOP_OUTPUT_DIR -Filter $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
            if (!$match) {
              throw "Missing expected release artifact matching pattern: $pattern"
            }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: psforge-desktop-windows-release
          path: |
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.exe
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.zip
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.yml
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.blockmap

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.exe
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.zip
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.yml
            ${{ env.DESKTOP_OUTPUT_DIR }}/*.blockmap
