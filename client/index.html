<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>PSForge - Professional PowerShell Script Builder & AI Assistant</title>
    <meta name="title" content="PSForge - Professional PowerShell Script Builder & AI Assistant" />
    <meta name="description" content="Build PowerShell scripts visually with PSForge. AI-powered assistant, 623 enterprise automation tasks, real-time validation. Free tier + $5/month Pro. IT automation for Active Directory, Azure, Exchange, Hyper-V, Intune & more." />
    <meta name="keywords" content="PowerShell script builder, PowerShell automation, IT automation tools, Active Directory scripts, Azure automation, Exchange scripts, PowerShell AI assistant, enterprise IT tools, system administration, DevOps automation" />
    <meta name="author" content="PSForge" />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://psforge.app/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://psforge.app/" />
    <meta property="og:title" content="PSForge - Professional PowerShell Script Builder & AI Assistant" />
    <meta property="og:description" content="Build PowerShell scripts visually with PSForge. AI-powered assistant, 623 enterprise automation tasks, real-time validation. Free tier + $5/month Pro for IT professionals." />
    <meta property="og:image" content="https://psforge.app/og-image.png" />
    <meta property="og:site_name" content="PSForge" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://psforge.app/" />
    <meta name="twitter:title" content="PSForge - Professional PowerShell Script Builder & AI Assistant" />
    <meta name="twitter:description" content="Build PowerShell scripts visually with PSForge. AI-powered assistant, 623 enterprise automation tasks, real-time validation. Free tier + $5/month Pro." />
    <meta name="twitter:image" content="https://psforge.app/og-image.png" />
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PSForge",
      "url": "https://psforge.app",
      "logo": "https://psforge.app/logo.png",
      "description": "Professional PowerShell script builder with AI-powered assistance and enterprise automation tools",
      "sameAs": []
    }
    </script>
    
    <!-- Structured Data - WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PSForge",
      "url": "https://psforge.app",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web Browser",
      "description": "Professional PowerShell script builder with AI-powered assistance, 623 enterprise automation tasks, and real-time validation for IT professionals and system administrators",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier with basic features"
      },
      "featureList": [
        "AI-powered PowerShell assistant",
        "623 enterprise automation tasks",
        "Real-time script validation",
        "Visual script builder",
        "Active Directory automation",
        "Azure & cloud platform integration",
        "Exchange Server automation",
        "Hyper-V management",
        "Intune & MECM support"
      ]
    }
    </script>
    
    <!-- Structured Data - Software Application with Subscription -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PSForge Pro",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "5.00",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "5.00",
          "priceCurrency": "USD",
          "billingDuration": "P1M",
          "billingIncrement": 1
        },
        "description": "Pro subscription with AI assistant and all enterprise features"
      }
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
